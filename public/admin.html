<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出缺勤後台管理</title>
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<h1>📋 臨時人員出缺勤後台</h1>

<!-- ── Tabs ── -->
<div class="tabs">
  <button class="tab-btn active">出勤紀錄</button>
  <button class="tab-btn">領據管理</button>
  <button class="tab-btn">使用者管理</button>
  <button class="tab-btn">領取單與簽到簿匯出</button>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Tab 1: 出勤紀錄 -->
<!-- ═══════════════════════════════════════════════ -->
<div id="tab-attendance" class="tab-content active">

  <div class="filter-bar">
    <label>年份
      <input type="number" id="filterYear" placeholder="115" style="width:72px">
    </label>
    <label>月份
      <select id="filterMonth">
        <option value="">全部</option>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </label>
    <label>姓名
      <input type="text" id="filterName" placeholder="搜尋姓名" style="width:120px">
    </label>
    <button class="btn btn-primary" id="btn-search">搜尋</button>
    <button class="btn btn-success" id="btn-export-excel">匯出出勤 Excel</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-count">-</div>
      <div class="stat-label">出勤總筆數</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-hours">-</div>
      <div class="stat-label">總工作時數（時）</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-people">-</div>
      <div class="stat-label">臨時人員人數</div>
    </div>
  </div>

  <div id="batch-bar" class="batch-bar hidden">
    <span id="batch-count">0</span> 筆已選取
    <button class="btn btn-danger-sm" id="btn-batch-delete">批量刪除</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="select-all"></th>
          <th>#</th>
          <th>姓名</th>
          <th>類型</th>
          <th>課程名稱</th>
          <th>日期（民國）</th>
          <th>簽到時間</th>
          <th>簽退時間</th>
          <th>時數</th>
          <th>工作時段</th>
          <th>工作內容</th>
          <th>備註</th>
          <th>狀態</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="14" class="empty">載入中…</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 分頁控制 -->
  <div id="pagination-bar" class="card hidden" style="display:flex;justify-content:center;align-items:center;gap:16px;padding:12px;margin-bottom:16px;">
    <button class="btn btn-sm" id="btn-page-prev" style="padding:6px 16px;">上一頁</button>
    <span style="font-size:14px;">第 <strong id="page-current">1</strong> / <strong id="page-total">1</strong> 頁（共 <span id="page-record-total">0</span> 筆）</span>
    <button class="btn btn-sm" id="btn-page-next" style="padding:6px 16px;">下一頁</button>
  </div>

  <!-- 已刪除記錄（誤刪救回） -->
  <div id="deleted-section" class="deleted-section hidden">
    <details>
      <summary>已刪除的記錄（<span class="deleted-count">0</span> 筆）— 點擊展開還原</summary>
      <div class="deleted-list"></div>
    </details>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Tab 2: 領據管理 -->
<!-- ═══════════════════════════════════════════════ -->
<div id="tab-receipt" class="tab-content">

  <div class="filter-bar">
    <label>年份
      <input type="number" id="receiptFilterYear" placeholder="115" style="width:72px">
    </label>
    <label>月份
      <select id="receiptFilterMonth">
        <option value="">全部</option>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </label>
    <label>姓名
      <input type="text" id="receiptFilterName" placeholder="搜尋姓名" style="width:120px">
    </label>
    <button class="btn btn-primary" id="btn-receipt-search">搜尋</button>
    <button class="btn btn-success" id="btn-export-all-receipts">匯出全部領據 Word</button>
  </div>

  <div id="receipt-list" class="receipt-cards">
    <div class="empty" style="background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);">載入中…</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Tab 3: 使用者管理 -->
<!-- ═══════════════════════════════════════════════ -->
<div id="tab-users" class="tab-content">

  <div class="filter-bar">
    <label>搜尋姓名
      <input type="text" id="userFilterName" placeholder="搜尋姓名" style="width:160px">
    </label>
    <button class="btn btn-primary" id="btn-user-search">搜尋</button>
  </div>

  <div class="stats-cards" id="user-stats">
    <div class="stat-card"><div class="stat-value" id="stat-user-count">0</div><div class="stat-label">註冊人數</div></div>
  </div>

  <div class="table-wrap">
    <table id="user-table">
      <thead>
        <tr>
          <th>#</th>
          <th>姓名</th>
          <th>身分證</th>
          <th>電話</th>
          <th>事由名稱</th>
          <th>工作內容</th>
          <th>費用別</th>
          <th>領款方式</th>
          <th>匯款資訊</th>
          <th>戶籍地址</th>
          <th>居住地址</th>
          <th>註冊時間</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="user-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Tab 4: 臨時人員費領取單 -->
<!-- ═══════════════════════════════════════════════ -->
<div id="tab-custom-export" class="tab-content">

  <div class="card" style="margin-bottom:16px;">
    <h3 style="margin:0 0 16px 0;font-size:16px;">臨時人員費領取單</h3>
    <p style="color:#6b7280;font-size:13px;margin-bottom:16px;">勾選臨時人員，填寫事由、日期、金額，匯出為 Word 領取單</p>

    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
      <div style="flex:1;min-width:300px;">
        <label class="q-label">事由</label>
        <input type="text" id="custom-reason" placeholder="例：協助「台北市醫師公會 健康台灣深耕計畫」處方兌換日活動跟課及場佈支援" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;">
      </div>
    </div>

    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px;">
      <div>
        <label class="q-label">日期（民國年/月/日）</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="number" id="custom-year" placeholder="115" style="width:70px;padding:8px;border:1px solid #d1d5db;border-radius:6px;"> 年
          <input type="number" id="custom-month" placeholder="04" min="1" max="12" style="width:60px;padding:8px;border:1px solid #d1d5db;border-radius:6px;"> 月
          <input type="number" id="custom-day" placeholder="11" min="1" max="31" style="width:60px;padding:8px;border:1px solid #d1d5db;border-radius:6px;"> 日
        </div>
      </div>
      <div>
        <label class="q-label">統一金額</label>
        <div style="display:flex;gap:6px;align-items:center;">
          <input type="number" id="custom-amount" placeholder="1500" style="width:140px;padding:8px;border:1px solid #d1d5db;border-radius:6px;"> 元
          <button class="btn btn-primary" id="btn-apply-amount" style="height:38px;">套用到所有勾選</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
          <input type="checkbox" id="custom-select-all"> <strong>全選</strong>
        </label>
        <span style="color:#6b7280;font-size:13px;" id="custom-selected-count">已選 0 人</span>
        <input type="text" id="custom-search-name" placeholder="搜尋姓名" style="padding:6px 10px;border:1px solid #d1d5db;border-radius:6px;width:140px;font-size:13px;">
      </div>
      <button class="btn btn-success" id="btn-custom-export" style="font-weight:600;">匯出領取單 Word</button>
      <button class="btn btn-primary" id="btn-custom-export-attendance" style="font-weight:600;">匯出工作說明及簽到簿 Word</button>
    </div>

    <div class="table-wrap">
      <table id="custom-export-table">
        <thead>
          <tr>
            <th style="width:40px;">勾選</th>
            <th>姓名</th>
            <th>職務</th>
            <th style="width:140px;">個別金額</th>
          </tr>
        </thead>
        <tbody id="custom-export-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
