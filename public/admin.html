<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出缺勤後台管理</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "Noto Sans TC", sans-serif; background: #f5f5f5; padding: 24px; }
h1 { font-size: 22px; color: #333; margin-bottom: 18px; }

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 16px;
  background: #fff;
  border-radius: 8px 8px 0 0;
  overflow: hidden;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
.tab-btn {
  flex: 1;
  padding: 14px 20px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  border: none;
  cursor: pointer;
  background: #fff;
  color: #5f6368;
  border-bottom: 3px solid transparent;
  transition: all .2s;
}
.tab-btn:hover { background: #f8f9fa; }
.tab-btn.active { color: #1a73e8; border-bottom-color: #1a73e8; }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── Filter & Buttons ── */
.filter-bar {
  background: #fff;
  padding: 16px 20px;
  border-radius: 8px;
  margin-bottom: 14px;
  display: flex;
  gap: 14px;
  align-items: center;
  flex-wrap: wrap;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
.filter-bar label { font-size: 13px; color: #555; display: flex; align-items: center; gap: 6px; }
.filter-bar input,
.filter-bar select {
  padding: 6px 10px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 13px;
  font-family: inherit;
}

.btn {
  padding: 8px 18px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: background .15s;
}
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-success { background: #34a853; color: #fff; }
.btn-success:hover { background: #2d9348; }
.btn-outline {
  background: #fff;
  color: #1a73e8;
  border: 1px solid #1a73e8;
}
.btn-outline:hover { background: #e8f0fe; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── Stats ── */
.stats {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 14px;
}
.stat-card {
  background: #fff;
  padding: 16px;
  border-radius: 8px;
  text-align: center;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
.stat-num { font-size: 30px; font-weight: 700; color: #1a73e8; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; }

/* ── Table ── */
.table-wrap {
  background: #fff;
  border-radius: 8px;
  overflow: auto;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
}
table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
th {
  background: #1a73e8;
  color: #fff;
  padding: 11px 12px;
  text-align: center;
  font-weight: 500;
  white-space: nowrap;
}
td {
  padding: 9px 12px;
  border-bottom: 1px solid #f0f0f0;
  text-align: center;
  color: #333;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8f9fa; }

.tag {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 12px;
  font-size: 12px;
}
.tag-done { background: #e8f5e9; color: #2e7d32; }
.tag-in   { background: #fff3e0; color: #e65100; }

.empty { text-align: center; color: #aaa; padding: 32px; }

/* ── 領據卡片 ── */
.receipt-cards { display: flex; flex-direction: column; gap: 16px; }

.receipt-card {
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 1px 3px rgba(0,0,0,.1);
  overflow: hidden;
}
.receipt-card-header {
  background: #1a73e8;
  color: #fff;
  padding: 14px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.receipt-card-header h3 { font-size: 16px; font-weight: 500; }
.receipt-card-body { padding: 20px; }

.receipt-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.receipt-table th,
.receipt-table td {
  border: 1px solid #d0d0d0;
  padding: 10px 14px;
  text-align: left;
  vertical-align: top;
}
.receipt-table th {
  background: #f0f4f9;
  color: #333;
  font-weight: 500;
  white-space: nowrap;
  width: 120px;
}
.receipt-table td {
  color: #333;
  border-bottom: 1px solid #d0d0d0;
}

.receipt-title {
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  padding: 14px;
  background: #f8f9fa;
  border: 1px solid #d0d0d0;
  border-bottom: none;
  color: #333;
}

.fee-tag {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  margin: 2px;
}
.fee-tag-active { background: #e8f0fe; color: #1a73e8; border: 1px solid #1a73e8; }
.fee-tag-inactive { background: #f5f5f5; color: #bbb; border: 1px solid #e0e0e0; }

.id-display {
  font-family: monospace;
  font-size: 15px;
  letter-spacing: 4px;
}

.masked { color: #999; }


</style>
</head>
<body>

<h1>📋 臨時人員出缺勤後台</h1>

<!-- ── Tabs ── -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('attendance')">出勤紀錄</button>
  <button class="tab-btn" onclick="switchTab('receipt')">領據管理</button>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Tab 1: 出勤紀錄 -->
<!-- ═══════════════════════════════════════════════ -->
<div id="tab-attendance" class="tab-content active">

  <div class="filter-bar">
    <label>年份
      <input type="number" id="filterYear" placeholder="115" style="width:72px">
    </label>
    <label>月份
      <select id="filterMonth">
        <option value="">全部</option>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </label>
    <label>姓名
      <input type="text" id="filterName" placeholder="搜尋姓名" style="width:120px">
    </label>
    <button class="btn btn-primary" onclick="loadRecords()">搜尋</button>
    <button class="btn btn-success" onclick="exportExcel()">匯出出勤 Excel</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-count">-</div>
      <div class="stat-label">出勤總筆數</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-hours">-</div>
      <div class="stat-label">總工作時數（時）</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-people">-</div>
      <div class="stat-label">臨時人員人數</div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>姓名</th>
          <th>類型</th>
          <th>課程名稱</th>
          <th>日期（民國）</th>
          <th>簽到時間</th>
          <th>簽退時間</th>
          <th>時數</th>
          <th>工作時段</th>
          <th>工作內容</th>
          <th>備註</th>
          <th>狀態</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="12" class="empty">載入中…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ -->
<!-- Tab 2: 領據管理 -->
<!-- ═══════════════════════════════════════════════ -->
<div id="tab-receipt" class="tab-content">

  <div class="filter-bar">
    <label>年份
      <input type="number" id="receiptFilterYear" placeholder="115" style="width:72px">
    </label>
    <label>月份
      <select id="receiptFilterMonth">
        <option value="">全部</option>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </label>
    <label>姓名
      <input type="text" id="receiptFilterName" placeholder="搜尋姓名" style="width:120px">
    </label>
    <button class="btn btn-primary" onclick="loadReceipts()">搜尋</button>
    <button class="btn btn-success" onclick="exportAllReceipts()">匯出全部領據 Word</button>
  </div>

  <div id="receipt-list" class="receipt-cards">
    <div class="empty" style="background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.1);">載入中…</div>
  </div>
</div>

<script>
const ALL_FEE_TYPES = ["稿費","審查費","講座鐘點費","臨時人員費","出席費","交通差旅費","其他"];
let cachedRecords = [];

function fmt(isoStr) {
  if (!isoStr) return "-";
  return new Date(isoStr).toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" });
}

function maskId(id) {
  if (!id || id.length < 4) return id || "-";
  return id.substring(0, 3) + "****" + id.substring(7);
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));

  if (tab === "attendance") {
    document.querySelectorAll(".tab-btn")[0].classList.add("active");
    document.getElementById("tab-attendance").classList.add("active");
  } else {
    document.querySelectorAll(".tab-btn")[1].classList.add("active");
    document.getElementById("tab-receipt").classList.add("active");
    loadReceipts();
  }
}

// ═══════════════════════════════════════════
// Tab 1: 出勤紀錄
// ═══════════════════════════════════════════
async function loadRecords() {
  const year  = document.getElementById("filterYear").value;
  const month = document.getElementById("filterMonth").value;
  const name  = document.getElementById("filterName").value.trim();

  try {
    const res = await fetch("/records");
    let records = await res.json();
    cachedRecords = records;

    if (year)  records = records.filter(r => r.year  === parseInt(year));
    if (month) records = records.filter(r => r.month === parseInt(month));
    if (name)  records = records.filter(r => r.name && r.name.includes(name));

    records.sort((a, b) => new Date(a.checkinTime) - new Date(b.checkinTime));

    const completed  = records.filter(r => r.status === "checked-out");
    const totalHours = completed.reduce((s, r) => s + (r.hours || 0), 0);
    const people     = new Set(records.map(r => r.name)).size;

    document.getElementById("stat-count").textContent  = records.length;
    document.getElementById("stat-hours").textContent  = Math.round(totalHours * 10) / 10;
    document.getElementById("stat-people").textContent = people;

    const tbody = document.getElementById("tbody");
    if (records.length === 0) {
      tbody.innerHTML = '<tr><td colspan="12" class="empty">查無記錄</td></tr>';
      return;
    }

    tbody.innerHTML = records.map((r, i) => {
      const dateStr   = r.year ? `${r.year}/${r.month}/${r.day}` : "-";
      const content   = Array.isArray(r.workContent) ? r.workContent.join("、") : "-";
      const typeLabel = r.checkinType === "prescription" ? "處方日" : "一般";
      const courseStr = Array.isArray(r.courses) && r.courses.length > 0
        ? r.courses.join("、") : (r.course || "-");
      const tag = r.status === "checked-out"
        ? '<span class="tag tag-done">完成</span>'
        : '<span class="tag tag-in">簽到中</span>';
      return `<tr>
        <td>${i + 1}</td>
        <td>${r.name || "-"}</td>
        <td>${typeLabel}</td>
        <td>${courseStr}</td>
        <td>${dateStr}</td>
        <td>${fmt(r.checkinTime)}</td>
        <td>${fmt(r.checkoutTime)}</td>
        <td>${r.hours != null ? r.hours + " 時" : "-"}</td>
        <td>${r.shift || "-"}</td>
        <td style="text-align:left">${content}</td>
        <td style="text-align:left">${r.note || "-"}</td>
        <td>${tag}</td>
      </tr>`;
    }).join("");
  } catch (e) {
    document.getElementById("tbody").innerHTML =
      `<tr><td colspan="12" style="color:red;text-align:center;padding:20px">載入失敗：${e.message}</td></tr>`;
  }
}

function exportExcel() {
  const params = new URLSearchParams();
  const year  = document.getElementById("filterYear").value;
  const month = document.getElementById("filterMonth").value;
  const name  = document.getElementById("filterName").value.trim();
  if (year)  params.set("year",  year);
  if (month) params.set("month", month);
  if (name)  params.set("name",  name);
  window.location.href = "/export?" + params.toString();
}

// ═══════════════════════════════════════════
// Tab 2: 領據管理
// ═══════════════════════════════════════════
async function loadReceipts() {
  const year  = document.getElementById("receiptFilterYear").value;
  const month = document.getElementById("receiptFilterMonth").value;
  const name  = document.getElementById("receiptFilterName").value.trim();

  try {
    const res = await fetch("/records");
    let records = await res.json();

    if (year)  records = records.filter(r => r.year  === parseInt(year));
    if (month) records = records.filter(r => r.month === parseInt(month));
    if (name)  records = records.filter(r => r.name && r.name.includes(name));

    // 依姓名分組
    const grouped = {};
    records.forEach(r => {
      if (!r.name) return;
      if (!grouped[r.name]) grouped[r.name] = [];
      grouped[r.name].push(r);
    });

    const container = document.getElementById("receipt-list");

    if (Object.keys(grouped).length === 0) {
      container.innerHTML = '<div class="empty" style="background:#fff;border-radius:8px;padding:32px;box-shadow:0 1px 3px rgba(0,0,0,.1);">查無領據資料</div>';
      return;
    }

    container.innerHTML = Object.entries(grouped).map(([personName, recs]) => {
      // 取最新一筆有領據資料的紀錄
      const latest = recs.find(r => r.idNumber) || recs[0];
      const completedRecs = recs.filter(r => r.status === "checked-out");
      const totalHours = completedRecs.reduce((s, r) => s + (r.hours || 0), 0);

      const feeTypes = Array.isArray(latest.feeTypes) ? latest.feeTypes : [];
      const feeHtml = ALL_FEE_TYPES.map(ft => {
        const active = feeTypes.includes(ft);
        return `<span class="fee-tag ${active ? 'fee-tag-active' : 'fee-tag-inactive'}">${active ? '☑' : '☐'} ${ft}</span>`;
      }).join("");

      const bankHtml = latest.payMethod === "匯款" && latest.bankInfo
        ? `<br>受款銀行：${latest.bankInfo.bankName || "-"}<br>戶名：${latest.bankInfo.accountName || "-"}<br>帳號：${latest.bankInfo.account || "-"}`
        : "";

      const qp = new URLSearchParams();
      qp.set("name", personName);
      if (year)  qp.set("year", year);
      if (month) qp.set("month", month);

      return `
      <div class="receipt-card">
        <div class="receipt-card-header">
          <h3>${personName}（共 ${recs.length} 筆，${Math.round(totalHours * 10) / 10} 小時）</h3>
          <button class="btn btn-outline btn-sm" style="color:#fff;border-color:#fff;" onclick="window.location.href='/export-full?${qp.toString()}'">
            匯出領據 Word
          </button>
        </div>
        <div class="receipt-card-body">
          <!-- 領據 -->
          <div class="receipt-title">社團法人台北市醫師公會 · 領據（健康台灣深耕計畫）</div>
          <table class="receipt-table">
            <tr>
              <th>領款人姓名</th>
              <td>${personName}</td>
              <th>事由或會議名稱</th>
              <td>${latest.eventName || "-"}</td>
            </tr>
            <tr>
              <th>費用別</th>
              <td colspan="3">${feeHtml}</td>
            </tr>
            <tr>
              <th>金額</th>
              <td colspan="3" style="color:#999;">（待填寫）</td>
            </tr>
            <tr>
              <th>領款方式</th>
              <td colspan="3">
                <span class="fee-tag ${latest.payMethod === '現金' ? 'fee-tag-active' : 'fee-tag-inactive'}">☐ 現金</span>
                <span class="fee-tag ${latest.payMethod === '匯款' ? 'fee-tag-active' : 'fee-tag-inactive'}">☐ 匯款</span>
                ${bankHtml}
              </td>
            </tr>
            <tr>
              <th>身分證號碼</th>
              <td colspan="3"><span class="id-display">${maskId(latest.idNumber)}</span></td>
            </tr>
            <tr>
              <th>戶籍地址</th>
              <td colspan="3">${latest.address || "-"}</td>
            </tr>
            <tr>
              <th>居住地址</th>
              <td colspan="3">${latest.liveAddress || "-"}</td>
            </tr>
            <tr>
              <th>連絡電話</th>
              <td colspan="3">${latest.phone || "-"}</td>
            </tr>
          </table>
        </div>
      </div>`;
    }).join("");

  } catch (e) {
    document.getElementById("receipt-list").innerHTML =
      `<div style="color:red;text-align:center;padding:20px;background:#fff;border-radius:8px;">載入失敗：${e.message}</div>`;
  }
}

function exportAllReceipts() {
  const params = new URLSearchParams();
  const year  = document.getElementById("receiptFilterYear").value;
  const month = document.getElementById("receiptFilterMonth").value;
  if (year)  params.set("year", year);
  if (month) params.set("month", month);
  window.location.href = "/export-full?" + params.toString();
}

loadRecords();
</script>
</body>
</html>
