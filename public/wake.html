<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="喚醒 MeetBot">
<title>喚醒 MeetBot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #f0f2f5;
  }
  .card {
    text-align: center; padding: 40px 30px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,.08);
    max-width: 340px; width: 90%;
  }
  h2 { font-size: 18px; color: #333; margin-bottom: 24px; }
  #btn {
    width: 140px; height: 140px; border-radius: 50%;
    border: none; cursor: pointer;
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: #fff; font-size: 22px; font-weight: 700;
    box-shadow: 0 6px 20px rgba(76,175,80,.4);
    transition: transform .15s, box-shadow .15s;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 20px;
  }
  #btn:active { transform: scale(.93); box-shadow: 0 2px 10px rgba(76,175,80,.3); }
  #btn.loading { background: linear-gradient(135deg, #FFA726, #F57C00); }
  #btn.ok { background: linear-gradient(135deg, #42A5F5, #1565C0); }
  #btn.fail { background: linear-gradient(135deg, #EF5350, #C62828); }
  #status { font-size: 15px; color: #666; min-height: 24px; }
</style>
</head>
<body>
<div class="card">
  <h2>MeetBot 伺服器喚醒</h2>
  <button id="btn" onclick="wake()">喚醒</button>
  <div id="status"></div>
</div>
<script>
async function wake() {
  const btn = document.getElementById('btn');
  const st  = document.getElementById('status');
  btn.className = 'loading';
  btn.textContent = '...';
  st.textContent = '正在喚醒，請稍候...';
  const t0 = Date.now();
  try {
    const r = await fetch('/health', { cache: 'no-store' });
    const ms = Date.now() - t0;
    if (r.ok) {
      btn.className = 'ok';
      btn.textContent = 'OK';
      st.textContent = `已喚醒（${(ms/1000).toFixed(1)} 秒）`;
    } else {
      throw new Error(r.status);
    }
  } catch (e) {
    btn.className = 'fail';
    btn.textContent = '失敗';
    st.textContent = '喚醒失敗：' + e.message;
  }
  setTimeout(() => { btn.className = ''; btn.textContent = '喚醒'; }, 5000);
}
</script>
</body>
</html>
